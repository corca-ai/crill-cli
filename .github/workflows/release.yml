name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify mirrored release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name' > assets.txt
          grep -Fx "crill_${{ steps.version.outputs.version }}_darwin_arm64.tar.gz" assets.txt
          grep -Fx "checksums.txt" assets.txt
